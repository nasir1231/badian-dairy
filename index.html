<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Badian Fresh Dairy Supply</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:#F3F0EB;color:#1A2B1A;min-height:100vh;overflow-x:hidden}

/* ── Variables ── */
:root{
  --g0:#0B3A22;--g1:#1B5E3B;--g2:#2E7D52;
  --red:#C62828;--red-bg:rgba(198,40,40,.1);
  --grn:#2E7D32;--grn-bg:rgba(46,125,50,.1);
  --amb:#B8860B;--amb-bg:rgba(184,134,11,.1);
  --bg:#F3F0EB;--card:#FFFFFF;--bdr:#E0DAD2;
  --text:#1A2B1A;--muted:#7A8A7A;
  --hh:54px;--tbh:42px;
}

/* ── PIN Screen ── */
#pinScreen{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(150deg,var(--g0) 0%,var(--g1) 60%,var(--g2) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;
}
.pin-logo{text-align:center;color:#fff}
.pin-logo-icon{font-size:54px;display:block;margin-bottom:8px}
.pin-logo h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.pin-logo p{font-size:12px;opacity:.65;margin-top:3px}
.pin-err{font-size:12px;color:rgba(255,120,120,.9);height:18px;text-align:center}
.pin-dots{display:flex;gap:16px}
.dot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.45);transition:.15s}
.dot.filled{background:#fff;border-color:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,70px);gap:10px}
.pk{width:70px;height:70px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:22px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;transition:.1s}
.pk:active{background:rgba(255,255,255,.28)}
.pk.empty{border:none;background:transparent;cursor:default}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.shake{animation:shake .4s ease}

/* ── App Shell ── */
#app{display:none}
#hdr{
  position:fixed;top:0;left:0;right:0;height:var(--hh);
  background:var(--g1);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.hdr-title{color:#fff;font-weight:700;font-size:15px;flex:1;letter-spacing:-.2px;white-space:nowrap;overflow:hidden}
.hdr-month{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;flex-shrink:0}
.hm-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0 3px;line-height:1;font-family:'Outfit',sans-serif}
.hm-lbl{color:#fff;font-size:12px;font-weight:600;min-width:64px;text-align:center}
.sync-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:5px 9px;font-size:16px;cursor:pointer;flex-shrink:0}

/* ── Tab Bar ── */
#tabBar{
  position:fixed;top:var(--hh);left:0;right:0;height:var(--tbh);
  background:var(--card);border-bottom:1px solid var(--bdr);
  display:flex;overflow-x:auto;z-index:99;scrollbar-width:none;
}
#tabBar::-webkit-scrollbar{display:none}
.tb{
  flex:none;padding:0 13px;height:100%;border:none;background:none;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;
  color:var(--muted);white-space:nowrap;border-bottom:3px solid transparent;cursor:pointer;
  transition:color .15s,border-color .15s;
}
.tb.active{color:var(--g1);border-bottom-color:var(--g1);font-weight:700}

/* ── Content ── */
#content{padding-top:calc(var(--hh) + var(--tbh));padding-bottom:24px;min-height:100vh}
.pane{display:none;padding:10px 10px 20px}
.pane.active{display:block;animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Cards ── */
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.card-hero{background:linear-gradient(135deg,var(--g0),var(--g2));color:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(27,94,59,.3)}

/* ── Stats ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sc{background:var(--card);border-radius:12px;padding:13px 12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.sc-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.sc-val{font-size:19px;font-weight:700;color:var(--g1);line-height:1.1}
.sc-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* ── Section Header ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px}
.sh-t{font-size:14px;font-weight:700;color:var(--text)}

/* ── Buttons ── */
.btn{padding:9px 16px;border-radius:9px;border:none;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s;line-height:1;white-space:nowrap}
.btn:active{opacity:.72}
.btn-p{background:var(--g1);color:#fff}
.btn-d{background:var(--red);color:#fff}
.btn-o{background:none;border:1.5px solid var(--g1);color:var(--g1)}
.btn-g{background:none;border:1.5px solid var(--bdr);color:var(--text)}
.btn-wa{background:#25D366;color:#fff}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px}
.btn-full{width:100%;justify-content:center}
.mt10{margin-top:10px}

/* ── Forms ── */
.fg{margin-bottom:12px}
.fl{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.fi,.fsel{width:100%;padding:10px 13px;border:1.5px solid var(--bdr);border-radius:9px;font-family:'Outfit',sans-serif;font-size:15px;background:var(--card);color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.fi:focus,.fsel:focus{border-color:var(--g1)}

/* ── Search ── */
.search-wrap{margin-bottom:10px;position:relative}
.search-wrap input{padding-left:36px}
.search-wrap::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}

/* ── Modal ── */
#mOverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:none;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:18px 18px 0 0;padding:18px 18px 30px;width:100%;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:16px;font-weight:700}
.modal-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:2px;line-height:1}

/* ── List Items ── */
.li{background:var(--card);border-radius:11px;padding:12px 13px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px}
.li-info{flex:1;min-width:0}
.li-name{font-weight:600;font-size:14px;color:var(--text);margin-bottom:2px}
.li-sub{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.li-act{display:flex;gap:4px;flex-shrink:0}

/* ── Badges ── */
.badge{padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:700;display:inline-block;white-space:nowrap}
.bg-g{background:var(--grn-bg);color:var(--grn)}
.bg-r{background:var(--red-bg);color:var(--red)}
.bg-a{background:var(--amb-bg);color:var(--amb)}
.bg-b{background:rgba(27,94,59,.1);color:var(--g1)}

/* ── Register Grid ── */
.reg-wrap{overflow-x:auto;overflow-y:auto;-webkit-overflow-scrolling:touch;border-radius:11px;background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.07);max-height:calc(100vh - var(--hh) - var(--tbh) - 55px)}
.reg-tbl{border-collapse:collapse;font-size:12.5px}
.reg-tbl th,.reg-tbl td{border:1px solid var(--bdr);padding:0;height:30px}
.reg-tbl th{background:var(--g0);color:#fff;font-size:10px;font-weight:700;text-align:center;padding:0 3px;white-space:nowrap;height:28px}
/* Sticky header sticks to top of .reg-wrap scroll container */
.reg-tbl thead th{position:sticky;top:0;z-index:4;background:var(--g0)}
/* Sticky name column */
.nc{position:sticky;left:0;background:var(--card);z-index:2;min-width:110px;max-width:130px;padding:0 7px;font-size:11.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-right:2px solid var(--bdr) !important}
.nh{position:sticky;left:0;top:0;z-index:6 !important;background:var(--g0) !important;min-width:110px}
.gi{width:46px;border:none;background:transparent;text-align:center;font-size:13px;font-family:'Outfit',sans-serif;padding:5px 1px;display:block;outline:none;color:var(--text);-moz-appearance:textfield}
.gi::-webkit-outer-spin-button,.gi::-webkit-inner-spin-button{-webkit-appearance:none}
.gi:focus{background:rgba(27,94,59,.12);border-radius:3px}
.tot-c{background:rgba(27,94,59,.06);font-weight:700;font-size:11px;text-align:center;padding:0 5px;color:var(--g1);min-width:50px}
.day-t{background:var(--g1) !important;color:#fff !important;font-size:11px;font-weight:700;text-align:center;padding:0 3px}
.tot-row td{background:#0B3A22 !important;color:#fff !important}
.tot-row .nc{background:#0B3A22 !important;color:#fff !important;font-weight:700;font-size:11px}
.tot-row .day-t{background:#1B5E3B !important;color:#fff !important;font-size:12px;font-weight:700}
/* ── Row highlight ── */
.reg-tbl tbody tr.row-hi .nc{background:#FFF8E1 !important;color:var(--text) !important}
.reg-tbl tbody tr.row-hi td{background:#FFFDE7 !important}
.reg-tbl tbody tr.row-hi .tot-c{background:#FFF9C4 !important;color:var(--g1) !important}
/* ── Column highlight — header th ── */
.reg-tbl thead th.col-hi{background:#2E7D52 !important;color:#fff !important;box-shadow:inset 0 -3px 0 #FFF176}
/* ── Column highlight — body td cells ── */
.reg-tbl tbody td.col-hi{background:#E3F2E3 !important}
.reg-tbl tbody td.col-hi.tot-c{background:#C8E6C9 !important;color:var(--g1) !important}
/* ── Active focused cell — brightest ── */
.reg-tbl td.cell-hi{background:#A5D6A7 !important;box-shadow:inset 0 0 0 2px #2E7D52}

/* ── Ledger Table ── */
.ltbl{width:100%;border-collapse:collapse;font-size:12.5px}
.ltbl th{background:var(--g1);color:#fff;padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.ltbl td{padding:8px 10px;border-bottom:1px solid var(--bdr);vertical-align:top}
.ltbl tr:last-child td{border-bottom:none}

/* ── Utilities ── */
.tr{text-align:right}.tc{text-align:center}
.fw6{font-weight:600}.fw7{font-weight:700}
.text-g{color:var(--grn)}.text-r{color:var(--red)}.text-m{color:var(--muted)}
.empty-st{text-align:center;color:var(--muted);padding:40px 20px;font-size:13px;line-height:1.6}
.divider{height:1px;background:var(--bdr);margin:8px 0}
.row-pair{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}

/* ── Print ── */
#printArea{display:none}
@media print{
  body>*:not(#printArea){display:none!important}
  #printArea{display:block!important;font-family:'Outfit',sans-serif}
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
</style>
</head>
<body>

<!-- ═══════ PIN SCREEN ═══════ -->
<div id="pinScreen">
  <div class="pin-logo">
    <span class="pin-logo-icon">🥛</span>
    <h1>Badian Fresh Dairy</h1>
    <p>Badian, Lahore · Enter PIN</p>
  </div>
  <div class="pin-dots" id="pinDots">
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
  </div>
  <div class="pin-err" id="pinErr"></div>
  <div class="pin-pad">
    <button class="pk" onclick="pinPress('1')">1</button>
    <button class="pk" onclick="pinPress('2')">2</button>
    <button class="pk" onclick="pinPress('3')">3</button>
    <button class="pk" onclick="pinPress('4')">4</button>
    <button class="pk" onclick="pinPress('5')">5</button>
    <button class="pk" onclick="pinPress('6')">6</button>
    <button class="pk" onclick="pinPress('7')">7</button>
    <button class="pk" onclick="pinPress('8')">8</button>
    <button class="pk" onclick="pinPress('9')">9</button>
    <div class="pk empty"></div>
    <button class="pk" onclick="pinPress('0')">0</button>
    <button class="pk" onclick="pinBack()">⌫</button>
  </div>
</div>

<!-- ═══════ APP ═══════ -->
<div id="app">

  <header id="hdr">
    <span class="hdr-title">🥛 Badian Fresh</span>
    <div class="hdr-month">
      <button class="hm-btn" onclick="prevMonth()">‹</button>
      <span class="hm-lbl" id="monthLbl">Apr 2025</span>
      <button class="hm-btn" onclick="nextMonth()">›</button>
    </div>
    <button class="sync-btn" onclick="syncSheets()" title="Sync to Google Sheets">☁️</button>
  </header>

  <div id="tabBar">
    <button class="tb active" data-tab="dashboard" onclick="showTab('dashboard')">Dashboard</button>
    <button class="tb" data-tab="sales" onclick="showTab('sales')">Sale Register</button>
    <button class="tb" data-tab="purchases" onclick="showTab('purchases')">Purchase Reg.</button>
    <button class="tb" data-tab="expenses" onclick="showTab('expenses')">Expense/Cash</button>
    <button class="tb" data-tab="customers" onclick="showTab('customers')">Customers</button>
    <button class="tb" data-tab="suppliers" onclick="showTab('suppliers')">Suppliers</button>
    <button class="tb" data-tab="receivable" onclick="showTab('receivable')">Receivable</button>
    <button class="tb" data-tab="payable" onclick="showTab('payable')">Payable</button>
    <button class="tb" data-tab="settings" onclick="showTab('settings')">Settings</button>
  </div>

  <main id="content">
    <div id="pane-dashboard" class="pane active"></div>
    <div id="pane-sales" class="pane"></div>
    <div id="pane-purchases" class="pane"></div>
    <div id="pane-expenses" class="pane"></div>
    <div id="pane-customers" class="pane"></div>
    <div id="pane-suppliers" class="pane"></div>
    <div id="pane-receivable" class="pane"></div>
    <div id="pane-payable" class="pane"></div>
    <div id="pane-settings" class="pane"></div>
  </main>

</div><!-- /app -->

<!-- ═══════ MODAL ═══════ -->
<div id="mOverlay" onclick="closeModal(event)">
  <div class="modal" id="mBox"></div>
</div>

<!-- ═══════ PRINT AREA ═══════ -->
<div id="printArea"></div>

<script>
'use strict';

// ════════════════════════════════════════════
// STORAGE KEY & STATE
// ════════════════════════════════════════════
var STORE_KEY = 'badianDairyApp_v1';

var state = {
  customers: [],
  suppliers: [],
  sales: {},
  purchases: {},
  expenses: [],
  recPayments: [],
  payPayments: [],
  openRecBal: {},
  openPayBal: {},
  settings: {
    pin: '1358',
    gsUrl: '',
    bizName: 'Badian Fresh Dairy Supply',
    bizAddr: 'Badian, Lahore'
  }
};

var curTab = 'dashboard';
var selMonth = '';
var pinBuf = '';

// ════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════
function eid(id) { return document.getElementById(id); }

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
}

function nowMonth() {
  var d = new Date();
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  return y + '-' + m;
}

function daysIn(ym) {
  var parts = ym.split('-');
  return new Date(Number(parts[0]), Number(parts[1]), 0).getDate();
}

function monthNames() {
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
}

function mLabel(ym) {
  if (!ym) return '';
  var parts = ym.split('-');
  return monthNames()[Number(parts[1]) - 1] + ' ' + parts[0];
}

function mShort(ym) {
  if (!ym) return '';
  return monthNames()[Number(ym.split('-')[1]) - 1];
}

function pn(v) { return parseFloat(v) || 0; }

function fmtQ(v) {
  var n = pn(v);
  if (n === 0) return '0';
  return n % 1 === 0 ? String(n) : n.toFixed(1);
}

function fmtR(v) {
  var n = Math.round(pn(v));
  return 'Rs\u00a0' + n.toLocaleString('en-PK');
}

function fmtDate(d) {
  if (!d) return '';
  var dt = new Date(d + 'T00:00:00');
  return dt.getDate() + ' ' + monthNames()[dt.getMonth()];
}

function adjMonth(ym, delta) {
  var parts = ym.split('-');
  var y = Number(parts[0]);
  var m = Number(parts[1]) - 1 + delta;
  var nd = new Date(y, m, 1);
  return nd.getFullYear() + '-' + String(nd.getMonth() + 1).padStart(2, '0');
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════
function saveState() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch(e) { console.error('Save error:', e); }
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    var d = JSON.parse(raw);
    state.customers = d.customers || [];
    state.suppliers = d.suppliers || [];
    state.sales = d.sales || {};
    state.purchases = d.purchases || {};
    state.expenses = d.expenses || [];
    state.recPayments = d.recPayments || [];
    state.payPayments = d.payPayments || [];
    state.openRecBal = d.openRecBal || {};
    state.openPayBal = d.openPayBal || {};
    if (d.settings) {
      state.settings.pin = d.settings.pin || '1358';
      state.settings.gsUrl = d.settings.gsUrl || '';
      state.settings.bizName = d.settings.bizName || 'Badian Fresh Dairy Supply';
      state.settings.bizAddr = d.settings.bizAddr || 'Badian, Lahore';
    }
  } catch(e) { console.error('Load error:', e); }
}

// ════════════════════════════════════════════
// PIN
// ════════════════════════════════════════════
function pinPress(digit) {
  if (pinBuf.length >= 4) return;
  pinBuf += digit;
  updateDots();
  if (pinBuf.length === 4) setTimeout(checkPin, 130);
}

function pinBack() {
  pinBuf = pinBuf.slice(0, -1);
  updateDots();
  eid('pinErr').textContent = '';
}

function updateDots() {
  for (var i = 1; i <= 4; i++) {
    var el = eid('d' + i);
    if (el) el.classList.toggle('filled', i <= pinBuf.length);
  }
}

function checkPin() {
  if (pinBuf === state.settings.pin) {
    eid('pinScreen').style.display = 'none';
    eid('app').style.display = 'block';
    showTab('dashboard');
  } else {
    var dots = eid('pinDots');
    dots.classList.add('shake');
    setTimeout(function() { dots.classList.remove('shake'); }, 450);
    eid('pinErr').textContent = 'Wrong PIN. Try again.';
    pinBuf = '';
    updateDots();
  }
}

// ════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════
function showTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tb').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('.pane').forEach(function(p) {
    p.classList.toggle('active', p.id === 'pane-' + tab);
  });
  var renders = {
    dashboard: renderDashboard,
    sales: renderSales,
    purchases: renderPurchases,
    expenses: renderExpenses,
    customers: renderCustomers,
    suppliers: renderSuppliers,
    receivable: renderReceivable,
    payable: renderPayable,
    settings: renderSettings
  };
  if (renders[tab]) renders[tab]();
}

function prevMonth() {
  selMonth = adjMonth(selMonth, -1);
  eid('monthLbl').textContent = mLabel(selMonth);
  showTab(curTab);
}

function nextMonth() {

// BALANCE CALCULATIONS
// ════════════════════════════════════════════
function custBal(cid) {
  var c = state.customers.find(function(x) { return x.id === cid; });
  if (!c) return 0;
  var bal = pn(state.openRecBal[cid] || 0);
  Object.keys(state.sales).forEach(function(m) {
    var days = (state.sales[m][cid] || {});
    Object.keys(days).forEach(function(d) { bal += pn(days[d]) * pn(c.rate); });
  });
  state.recPayments.filter(function(p) { return p.custId === cid; })
    .forEach(function(p) { bal -= pn(p.amount); });
  return bal;
}

function suppBal(sid) {
  var s = state.suppliers.find(function(x) { return x.id === sid; });
  if (!s) return 0;
  var bal = pn(state.openPayBal[sid] || 0);
  Object.keys(state.purchases).forEach(function(m) {
    var days = (state.purchases[m][sid] || {});
    Object.keys(days).forEach(function(d) { bal += pn(days[d]) * pn(s.rate); });
  });
  state.payPayments.filter(function(p) { return p.suppId === sid; })
    .forEach(function(p) { bal -= pn(p.amount); });
  return bal;
}

function custBalBefore(cid, beforeMonth) {
  var c = state.customers.find(function(x) { return x.id === cid; });
  if (!c) return 0;
  var bal = pn(state.openRecBal[cid] || 0);
  Object.keys(state.sales).filter(function(m) { return m < beforeMonth; }).forEach(function(m) {
    var days = (state.sales[m][cid] || {});
    Object.keys(days).forEach(function(d) { bal += pn(days[d]) * pn(c.rate); });
  });
  state.recPayments.filter(function(p) { return p.custId === cid && p.date && p.date.slice(0,7) < beforeMonth; })
    .forEach(function(p) { bal -= pn(p.amount); });
  return bal;
}

function suppBalBefore(sid, beforeMonth) {
  var s = state.suppliers.find(function(x) { return x.id === sid; });
  if (!s) return 0;
  var bal = pn(state.openPayBal[sid] || 0);
  Object.keys(state.purchases).filter(function(m) { return m < beforeMonth; }).forEach(function(m) {
    var days = (state.purchases[m][sid] || {});
    Object.keys(days).forEach(function(d) { bal += pn(days[d]) * pn(s.rate); });
  });
  state.payPayments.filter(function(p) { return p.suppId === sid && p.date && p.date.slice(0,7) < beforeMonth; })
    .forEach(function(p) { bal -= pn(p.amount); });
  return bal;
}

// ════════════════════════════════════════════
// REGISTER INPUT HANDLER (no re-render on keypress)
// ════════════════════════════════════════════
function handleRegIn(inp) {
  var val = inp.value.trim();
  var day = inp.dataset.day;
  var type = inp.dataset.type;
  var m = selMonth;

  if (type === 'sale') {
    var cid = inp.dataset.eid;
    if (!state.sales[m]) state.sales[m] = {};
    if (!state.sales[m][cid]) state.sales[m][cid] = {};
    if (!val || val === '0') delete state.sales[m][cid][day];
    else state.sales[m][cid][day] = val;
    saveState();
    updateSaleTots(cid, day, m);
  } else {
    var sid = inp.dataset.eid;
    if (!state.purchases[m]) state.purchases[m] = {};
    if (!state.purchases[m][sid]) state.purchases[m][sid] = {};
    if (!val || val === '0') delete state.purchases[m][sid][day];
    else state.purchases[m][sid][day] = val;
    saveState();
    updatePurchTots(sid, day, m);
  }
}

function updateSaleTots(cid, day, m) {
  var sd = state.sales[m] || {};
  var c = state.customers.find(function(x) { return x.id === cid; });
  if (!c) return;

  var rq = 0;
  Object.keys(sd[cid] || {}).forEach(function(d) { rq += pn(sd[cid][d]); });
  var ra = rq * pn(c.rate);
  var rqEl = eid('srq-' + cid); if (rqEl) rqEl.textContent = fmtQ(rq);
  var raEl = eid('sra-' + cid); if (raEl) raEl.textContent = fmtR(ra);

  var dq = 0;
  state.customers.forEach(function(x) { dq += pn((sd[x.id] || {})[day] || 0); });
  var dtEl = eid('sdt-' + day); if (dtEl) dtEl.textContent = dq > 0 ? fmtQ(dq) : '';

  var gq = 0, ga = 0;
  state.customers.forEach(function(x) {
    var xq = 0;
    Object.keys(sd[x.id] || {}).forEach(function(d) { xq += pn(sd[x.id][d]); });
    gq += xq; ga += xq * pn(x.rate);
  });
  var gqEl = eid('sgt-q'); if (gqEl) gqEl.textContent = fmtQ(gq);
  var gaEl = eid('sgt-a'); if (gaEl) gaEl.textContent = fmtR(ga);
}

function updatePurchTots(sid, day, m) {
  var pd = state.purchases[m] || {};
  var s = state.suppliers.find(function(x) { return x.id === sid; });
  if (!s) return;

  var rq = 0;
  Object.keys(pd[sid] || {}).forEach(function(d) { rq += pn(pd[sid][d]); });
  var ra = rq * pn(s.rate);
  var rqEl = eid('prq-' + sid); if (rqEl) rqEl.textContent = fmtQ(rq);
  var raEl = eid('pra-' + sid); if (raEl) raEl.textContent = fmtR(ra);

  var dq = 0;
  state.suppliers.forEach(function(x) { dq += pn((pd[x.id] || {})[day] || 0); });
  var dtEl = eid('pdt-' + day); if (dtEl) dtEl.textContent = dq > 0 ? fmtQ(dq) : '';

  var gq = 0, ga = 0;
  state.suppliers.forEach(function(x) {
    var xq = 0;
    Object.keys(pd[x.id] || {}).forEach(function(d) { xq += pn(pd[x.id][d]); });
    gq += xq; ga += xq * pn(x.rate);
  });
  var gqEl = eid('pgt-q'); if (gqEl) gqEl.textContent = fmtQ(gq);
  var gaEl = eid('pgt-a'); if (gaEl) gaEl.textContent = fmtR(ga);
}

// ════════════════════════════════════════════
// REGISTER HIGHLIGHT — row + full column on focus
// ════════════════════════════════════════════
function attachRegHighlight(tableEl) {
  if (!tableEl) return;

  function clearAll() {
    tableEl.querySelectorAll('.row-hi').forEach(function(el) { el.classList.remove('row-hi'); });
    tableEl.querySelectorAll('.col-hi').forEach(function(el) { el.classList.remove('col-hi'); });
    tableEl.querySelectorAll('.cell-hi').forEach(function(el) { el.classList.remove('cell-hi'); });
  }

  tableEl.addEventListener('focusin', function(ev) {
    var inp = ev.target;
    if (!inp || !inp.classList.contains('gi')) { clearAll(); return; }

    clearAll();

    // Get the focused td and its column index
    var td = inp.parentNode;
    if (!td || td.tagName !== 'TD') return;
    var colIdx = td.cellIndex;

    // Highlight entire row
    var row = td.parentNode;
    if (row && row.tagName === 'TR') row.classList.add('row-hi');

    // Highlight the focused cell specifically
    td.classList.add('cell-hi');

    // Highlight every cell in the same column across all body rows
    var bodyRows = tableEl.querySelectorAll('tbody tr');
    bodyRows.forEach(function(tr) {
      var cell = tr.cells[colIdx];
      if (cell) cell.classList.add('col-hi');
    });

    // Highlight matching header th at same column index
    var headRow = tableEl.querySelector('thead tr');
    if (headRow && headRow.cells[colIdx]) {
      headRow.cells[colIdx].classList.add('col-hi');
    }
  });

  tableEl.addEventListener('focusout', function(ev) {
    // Only clear if focus is moving outside the table entirely
    var next = ev.relatedTarget;
    if (next && tableEl.contains(next)) return; // still inside table
    clearAll();
  });
}

    Object.keys(mDays).forEach(function(d) { mQty += pn(mDays[d]); });

function filterCusts(q) {

// ACCOUNT RECEIVABLE
// ════════════════════════════════════════════
function renderReceivable() {
  var p = eid('pane-receivable');
  var m = selMonth;
  var custs = state.customers.slice().sort(function(a,b) { return a.name.localeCompare(b.name); });

  var grandPrev = 0, grandThis = 0, grandDue = 0, grandRec = 0, grandBal = 0;

  var rows = custs.map(function(c, i) {
    var prevBal  = custBalBefore(c.id, m);
    var mDays    = (state.sales[m] || {})[c.id] || {};
    var mQty     = 0;
    Object.keys(mDays).forEach(function(d) { mQty += pn(mDays[d]); });
    var thisMonth = mQty * pn(c.rate);
    var totalDue  = prevBal + thisMonth;
    var received  = state.recPayments
      .filter(function(pay) { return pay.custId === c.id && pay.date && pay.date.slice(0,7) === m; })
      .reduce(function(s, pay) { return s + pn(pay.amount); }, 0);
    var balance   = totalDue - received;

    grandPrev += prevBal; grandThis += thisMonth;
    grandDue  += totalDue; grandRec  += received; grandBal += balance;

    var bg = i % 2 === 0 ? 'var(--card)' : '#f7f9f7';
    return '<tr style="background:' + bg + ';">' +
      '<td style="' + TD_C + 'color:var(--muted);font-weight:700;width:28px;">' + (i+1) + '</td>' +
      '<td style="' + TD + '">' +
        '<div style="font-weight:700;font-size:13px;">' + escHtml(c.name) + '</div>' +
        '<div style="font-size:10px;color:var(--muted);margin-top:1px;">' + escHtml(c.phone || '—') + '</div>' +
      '</td>' +
      '<td style="' + TD_R + '">' +
        '<div style="font-size:12px;font-weight:600;color:' + (prevBal > 0 ? 'var(--red)' : prevBal < 0 ? 'var(--grn)' : 'var(--muted)') + ';">Rs ' + Math.round(Math.abs(prevBal)).toLocaleString('en-PK') + '</div>' +
        '<div style="font-size:10px;color:var(--muted);">' + (prevBal > 0 ? 'Dr' : prevBal < 0 ? 'Cr' : '—') + '</div>' +

function showCustLedger(cid) {
  var c = state.customers.find(function(x) { return x.id === cid; });
  if (!c) return;

  var monthSet = {};
  Object.keys(state.sales).forEach(function(m) { monthSet[m] = 1; });
  state.recPayments.filter(function(p) { return p.custId === cid && p.date; })
    .forEach(function(p) { monthSet[p.date.slice(0,7)] = 1; });
  var months = Object.keys(monthSet).sort();

  var bal = pn(state.openRecBal[cid] || 0);
  var rows = '';
  if (bal !== 0) {
    rows += '<tr><td colspan="2" style="padding:8px 10px;color:var(--muted);">Opening Balance</td>' +
      '<td style="padding:8px 10px;" class="tr fw6">' + fmtR(bal) + '</td></tr>';
  }

  months.forEach(function(m) {
    var mDays = (state.sales[m] || {})[cid] || {};
    var mq = 0;
    Object.keys(mDays).forEach(function(d) { mq += pn(mDays[d]); });
    var ma = mq * pn(c.rate);
    if (ma > 0) {
      bal += ma;
      rows += '<tr style="background:rgba(198,40,40,.03);">' +
        '<td style="padding:8px 10px;">' + mLabel(m) + '</td>' +
        '<td style="padding:8px 10px;color:var(--muted);">' + fmtQ(mq) + ' Kg × Rs' + c.rate + '</td>' +
        '<td style="padding:8px 10px;" class="tr text-r fw6">+' + fmtR(ma) + '</td></tr>' +
        '<tr><td colspan="2" style="padding:2px 10px 6px;font-size:10px;color:var(--muted);">Balance after sales</td>' +
        '<td style="padding:2px 10px 6px;" class="tr fw6">' + fmtR(bal) + '</td></tr>';
    }
    var pays = state.recPayments.filter(function(p) { return p.custId === cid && p.date && p.date.slice(0,7) === m; })
      .sort(function(a,b) { return a.date.localeCompare(b.date); });
    pays.forEach(function(pay) {
      bal -= pn(pay.amount);
      rows += '<tr style="background:rgba(46,125,50,.03);">' +
        '<td style="padding:8px 10px;">' + fmtDate(pay.date) + '</td>' +
        '<td style="padding:8px 10px;color:var(--muted);">' + escHtml(pay.note || 'Payment received') + '</td>' +
        '<td style="padding:8px 10px;" class="tr text-g fw6">(' + fmtR(pay.amount) + ')</td></tr>' +
        '<tr><td colspan="2" style="padding:2px 10px 6px;font-size:10px;color:var(--muted);">Balance after payment</td>' +
        '<td style="padding:2px 10px 6px;" class="tr fw6">' + fmtR(bal) + '</td></tr>';
    });
  });

  var balColor = bal > 0 ? 'text-r' : bal < 0 ? 'text-g' : '';
  var balLabel = bal > 0 ? 'Due' : bal < 0 ? 'Advance' : 'Clear';

  showModal(escHtml(c.name) + ' — Ledger',
    '<div style="overflow-x:auto;border-radius:10px;border:1px solid var(--bdr);">' +
      '<table style="width:100%;border-collapse:collapse;font-size:12.5px;">' +
        '<thead><tr style="background:var(--g1);color:#fff;">' +
          '<th style="padding:8px 9px;text-align:left;">Date</th>' +
          '<th style="padding:8px 9px;text-align:left;">Detail</th>' +
          '<th style="padding:8px 9px;text-align:right;">Amount</th></tr></thead>' +
        '<tbody>' + (rows || '<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--muted);">No transactions yet</td></tr>') + '</tbody>' +
      '</table>' +
    '</div>' +
    '<div style="margin-top:10px;padding:12px;background:var(--bg);border-radius:10px;display:flex;justify-content:space-between;align-items:center;">' +
      '<span class="fw7" style="font-size:14px;">Net Balance</span>' +
      '<span class="fw7 ' + balColor + '" style="font-size:16px;">' + fmtR(Math.abs(bal)) + ' ' + balLabel + '</span>' +
    '</div>' +

  );

function renderPayable() {
  var p = eid('pane-payable');

  var grandPrev = 0, grandThis = 0, grandDue = 0, grandPaid = 0, grandBal = 0;

  var rows = supps.map(function(s, i) {
    var prevBal   = suppBalBefore(s.id, m);

    Object.keys(mDays).forEach(function(d) { mQty += pn(mDays[d]); });

function showAddPay(type, entityId) {
  var isRec = type === 'receivable';
  var entity = isRec
    ? state.customers.find(function(x) { return x.id === entityId; })
    : state.suppliers.find(function(x) { return x.id === entityId; });
  if (!entity) return;
  var bal = isRec ? custBal(entityId) : suppBal(entityId);
  var today = new Date().toISOString().slice(0, 10);

  showModal('Payment — ' + escHtml(entity.name),
    '<div style="padding:10px 12px;background:var(--bg);border-radius:9px;margin-bottom:14px;">' +
      '<div style="font-size:11px;color:var(--muted);">Current Balance</div>' +
      '<div style="font-size:17px;font-weight:700;color:' + (bal > 0 ? 'var(--red)' : 'var(--grn)') + ';">' +
        fmtR(Math.abs(bal)) + (bal > 0 ? ' Due' : bal < 0 ? ' Advance' : ' Clear') +
      '</div>' +
    '</div>' +
    '<div class="fg"><label class="fl">Date</label><input type="date" class="fi" id="pDate" value="' + today + '"></div>' +
    '<div class="fg"><label class="fl">Amount (Rs)</label><input type="number" inputmode="decimal" class="fi" id="pAmt" placeholder="0"></div>' +
    '<div class="fg"><label class="fl">Note (optional)</label><input type="text" class="fi" id="pNote" placeholder="Cash, Online, Cheque..."></div>' +
    '<button class="btn btn-p btn-full mt10" onclick="savePay(\'' + type + '\',\'' + entityId + '\')">Save Payment</button>'
  );
}

function savePay(type, entityId) {
  var date = eid('pDate').value;
  var amt = pn(eid('pAmt').value);
  var note = eid('pNote').value.trim();
  if (!date || amt <= 0) { alert('Enter valid date and amount.'); return; }
  if (type === 'receivable') {
    state.recPayments.push({ id: genId(), date: date, custId: entityId, amount: amt, note: note });
  } else {
    state.payPayments.push({ id: genId(), date: date, suppId: entityId, amount: amt, note: note });
  }
  saveState(); closeModal();
  if (type === 'receivable') renderReceivable(); else renderPayable();
}

// BILL DATA BUILDER
// ════════════════════════════════════════════
function getBillData(type, entityId, month) {
  var isCust = type === 'customer';
  var entity = isCust
    ? state.customers.find(function(x) { return x.id === entityId; })
    : state.suppliers.find(function(x) { return x.id === entityId; });
  if (!entity) return null;

  var dataObj = isCust ? state.sales : state.purchases;
  var days = daysIn(month);
  var eDays = (dataObj[month] || {})[entityId] || {};
  var entries = [];
  var totalQty = 0;

  for (var d = 1; d <= days; d++) {
    var q = pn(eDays[d] || 0);
    if (q > 0) {
      totalQty += q;
      entries.push({ day: d, qty: q, amt: q * pn(entity.rate) });
    }
  }

  var totalAmt = totalQty * pn(entity.rate);
  var prevBal = isCust ? custBalBefore(entityId, month) : suppBalBefore(entityId, month);
  var pays = isCust
    ? state.recPayments.filter(function(p) { return p.custId === entityId && p.date && p.date.slice(0,7) === month; })
    : state.payPayments.filter(function(p) { return p.suppId === entityId && p.date && p.date.slice(0,7) === month; });
  var totalPays = pays.reduce(function(s, p) { return s + pn(p.amount); }, 0);
  var netDue = prevBal + totalAmt - totalPays;

  return { entity: entity, isCust: isCust, month: month, entries: entries, totalQty: totalQty, totalAmt: totalAmt, prevBal: prevBal, pays: pays, totalPays: totalPays, netDue: netDue };
}

function doWA(type, entityId) {
  var month = eid('billMonth') ? eid('billMonth').value : selMonth;
  var bd = getBillData(type, entityId, month);
  if (!bd) return;
  var mn = mShort(month);

  var lines = [
    '*' + state.settings.bizName + '*',
    state.settings.bizAddr,
    '📞 0300 4411263',
    '',
    (bd.isCust ? '🧾 Sale Bill' : '🧾 Purchase Bill') + ' — *' + mLabel(month) + '*',
    '━━━━━━━━━━━━━━━━━━',
    '*' + bd.entity.name + '*',
    (bd.entity.phone ? '📱 ' + bd.entity.phone : null),
    'Rate: Rs ' + bd.entity.rate + '/Kg',
    '━━━━━━━━━━━━━━━━━━'
  ];

  bd.entries.forEach(function(e) {
    lines.push(e.day + ' ' + mn + ':  ' + fmtQ(e.qty) + ' Kg  =  Rs ' + Math.round(e.amt).toLocaleString('en-PK'));
  });

  lines.push('━━━━━━━━━━━━━━━━━━');
  lines.push('*Total:  ' + fmtQ(bd.totalQty) + ' Kg  =  Rs ' + Math.round(bd.totalAmt).toLocaleString('en-PK') + '*');

  if (bd.prevBal !== 0) {
    lines.push('Prev. Balance:  Rs ' + Math.round(Math.abs(bd.prevBal)).toLocaleString('en-PK') + (bd.prevBal > 0 ? ' Dr' : ' Cr'));
  }
  if (bd.totalPays > 0) {
    lines.push((bd.isCust ? 'Payment Received:' : 'Payment Made:') + '  Rs ' + Math.round(bd.totalPays).toLocaleString('en-PK'));
  }

  lines.push('━━━━━━━━━━━━━━━━━━');
  lines.push('*Net Due:  Rs ' + Math.round(Math.abs(bd.netDue)).toLocaleString('en-PK') + (bd.netDue > 0 ? ' Dr' : bd.netDue < 0 ? ' Cr' : ' ✅ Clear') + '*');
  lines.push('');
  lines.push('_' + new Date().toLocaleDateString('en-PK') + '_');

  var text = lines.filter(function(l) { return l !== null && l !== undefined; }).join('\n');
  var rawPhone = (bd.entity.phone || '').replace(/\D/g, '');

  // Build wa.me URL — no phone = open WhatsApp without pre-filling number
  var waUrl;
  if (rawPhone.length >= 10) {
    if (rawPhone.charAt(0) === '0') rawPhone = '92' + rawPhone.slice(1);
    else if (rawPhone.slice(0,2) !== '92') rawPhone = '92' + rawPhone;
    waUrl = 'https://wa.me/' + rawPhone + '?text=' + encodeURIComponent(text);
  } else {
    waUrl = 'https://wa.me/?text=' + encodeURIComponent(text);
  }

  // Use location.href for iPhone Safari — window.open() gets blocked
  location.href = waUrl;
}

// ════════════════════════════════════════════
// GOOGLE SHEETS — TWO-WAY SYNC
// ════════════════════════════════════════════
// HOW IT WORKS:
//   PUSH  → POST to GAS → GAS saves full JSON to Drive file
//   PULL  → GET  from GAS → GAS returns JSON → app loads it
//   No no-cors. text/plain avoids CORS preflight. Apps Script handles it.

function getSyncBtn() { return document.querySelector('.sync-btn'); }
function setBtnState(s) { var b = getSyncBtn(); if (b) b.textContent = s; }

// ── PUSH ──────────────────────────────────
function syncSheets() {
  var url = state.settings.gsUrl;
  if (!url) { alert('Paste Apps Script URL in Settings → Google Sheets Sync first.'); return; }
  setBtnState('⏳');

  // Payload: action + full state. Content-Type text/plain avoids CORS preflight.
  fetch(url, {
    method : 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body   : JSON.stringify({ action: 'push', data: state })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(res) {
    if (res.status === 'ok') {
      setBtnState('✅');
      setTimeout(function() { setBtnState('☁️'); }, 2500);
    } else {
      throw new Error(res.msg || 'Unknown server error');
    }
  })
  .catch(function(err) {
    setBtnState('❌');
    setTimeout(function() { setBtnState('☁️'); }, 3000);
    alert('PUSH FAILED\n\n' + err.message + '\n\nCheck:\n1. Apps Script URL is correct\n2. Deployed as Web App\n3. Execute as: Me\n4. Who has access: Anyone');
  });
}

// ── PULL ──────────────────────────────────
function pullFromCloud(silent) {
  var url = state.settings.gsUrl;
  if (!url) { if (!silent) alert('Paste Apps Script URL in Settings first.'); return; }
  if (!silent) setBtnState('⬇️');

  fetch(url + '?action=pull&cb=' + Date.now())
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(res) {
    if (res.status === 'empty' || !res.data) {
      setBtnState('☁️');
      if (!silent) alert('No cloud data found.\nPush from your main device first, then Pull here.');
      // Mark that we tried — prevents infinite loop
      localStorage.setItem(STORE_KEY + '_pullDone', '1');
      return;
    }
    var d = res.data;
    // Only ask confirmation if local has real data AND this is a manual pull
    if (!silent && state.customers.length > 0) {
      if (!confirm('Load cloud data onto this device?\nYour local data will be replaced.')) {
        setBtnState('☁️'); return;
      }
    }
    // Merge pulled data into state
    if (d.customers   && d.customers.length)   state.customers   = d.customers;
    if (d.suppliers   && d.suppliers.length)   state.suppliers   = d.suppliers;
    if (d.sales       && Object.keys(d.sales).length)     state.sales       = d.sales;
    if (d.purchases   && Object.keys(d.purchases).length) state.purchases   = d.purchases;
    if (d.expenses    && d.expenses.length)    state.expenses    = d.expenses;
    if (d.recPayments && d.recPayments.length) state.recPayments = d.recPayments;
    if (d.payPayments && d.payPayments.length) state.payPayments = d.payPayments;
    if (d.openRecBal)  state.openRecBal = d.openRecBal;
    if (d.openPayBal)  state.openPayBal = d.openPayBal;
    if (d.settings) {
      state.settings.bizName = d.settings.bizName || state.settings.bizName;
      state.settings.bizAddr = d.settings.bizAddr || state.settings.bizAddr;
    }
    saveState();
    // Mark pull done so auto-pull never fires again this session
    localStorage.setItem(STORE_KEY + '_pullDone', '1');
    setBtnState('✅');
    if (!silent) {
      // Manual pull: reload to refresh all tabs — user explicitly requested this
      setTimeout(function() { location.reload(); }, 500);
    } else {
      // Auto-pull (silent): re-render current tab WITHOUT reloading — no loop risk
      setTimeout(function() {
        setBtnState('☁️');
        showTab(curTab);
      }, 500);
    }
  })
  .catch(function(err) {
    setBtnState('❌');
    setTimeout(function() { setBtnState('☁️'); }, 3000);
    localStorage.setItem(STORE_KEY + '_pullDone', '1');
    if (!silent) alert('PULL FAILED\n\n' + err.message + '\n\nCheck:\n1. Apps Script URL correct\n2. Execute as: Me\n3. Who has access: Anyone\n4. You used New Deployment (not Manage)');
  });
}

// ── GAS CODE viewer ───────────────────────
function showGasCode() {
  // This is the EXACT code to paste into Google Apps Script.
  // It uses DriveApp to store a file — no cell size limits.
  // doGet  → returns stored JSON to the app (PULL)
  // doPost → saves JSON sent from the app (PUSH)
  var gasCode =
'// ── Badian Dairy Supply — Apps Script v3 ──\n' +
'// Paste ALL of this. Delete any old code first.\n' +
'// Deploy: Web App · Execute as: Me · Access: Anyone\n' +
'\n' +
'var FILE_NAME = "badian_dairy_sync.json";\n' +
'\n' +
'// PULL — app calls GET to load data\n' +
'function doGet(e) {\n' +
'  try {\n' +
'    var files = DriveApp.getFilesByName(FILE_NAME);\n' +
'    if (!files.hasNext()) {\n' +
'      return respond({ status: "empty", data: null });\n' +
'    }\n' +
'    var content = files.next().getBlob().getDataAsString();\n' +
'    var saved   = JSON.parse(content);\n' +
'    return respond({ status: "ok", data: saved.data });\n' +
'  } catch (err) {\n' +
'    return respond({ status: "error", msg: err.toString() });\n' +
'  }\n' +
'}\n' +
'\n' +
'// PUSH — app calls POST to save data\n' +
'function doPost(e) {\n' +
'  try {\n' +
'    var body = e.postData.contents;\n' +
'    // Validate it is proper JSON before saving\n' +
'    var parsed = JSON.parse(body);\n' +
'    if (!parsed.data) throw new Error("No data field in payload");\n' +
'\n' +
'    var toSave = JSON.stringify({\n' +
'      data     : parsed.data,\n' +
'      savedAt  : new Date().toISOString()\n' +
'    });\n' +
'\n' +
'    var files = DriveApp.getFilesByName(FILE_NAME);\n' +
'    if (files.hasNext()) {\n' +
'      // Update existing file\n' +
'      files.next().setContent(toSave);\n' +
'    } else {\n' +
'      // Create new file\n' +
'      DriveApp.createFile(FILE_NAME, toSave, MimeType.PLAIN_TEXT);\n' +
'    }\n' +
'    return respond({ status: "ok", savedAt: new Date().toISOString() });\n' +
'  } catch (err) {\n' +
'    return respond({ status: "error", msg: err.toString() });\n' +
'  }\n' +
'}\n' +
'\n' +
'// Helper — returns proper JSON response with CORS headers\n' +
'function respond(obj) {\n' +
'  return ContentService\n' +
'    .createTextOutput(JSON.stringify(obj))\n' +
'    .setMimeType(ContentService.MimeType.JSON);\n' +
'}';

  showModal('📋 Google Apps Script Code',
    '<div style="background:#e8f5e9;border:1px solid #4CAF50;border-radius:9px;padding:11px 14px;font-size:12px;line-height:1.7;margin-bottom:12px;">' +
      '<strong>Step-by-step — do exactly this:</strong><br>' +
      '1. Go to <strong>script.google.com</strong> → New Project<br>' +
      '2. Select all default code → Delete it<br>' +
      '3. Copy code below → Paste it in → <strong>Ctrl+S</strong> to save<br>' +
      '4. Click <strong>Deploy</strong> → <strong>New deployment</strong><br>' +
      '5. Click gear ⚙️ → Type: <strong>Web app</strong><br>' +
      '6. Execute as: <strong>Me</strong> &nbsp;|&nbsp; Who has access: <strong>Anyone</strong><br>' +
      '7. Click <strong>Deploy</strong> → Authorise → Allow<br>' +
      '8. Copy the <strong>/exec</strong> URL → paste in Settings → Save URL' +
    '</div>' +
    '<div style="font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700;">APPS SCRIPT CODE:</div>' +
    '<textarea id="gasCodeBox" style="width:100%;height:260px;font-size:10px;font-family:monospace;border:1.5px solid var(--bdr);border-radius:8px;padding:10px;line-height:1.55;resize:none;" readonly>' + gasCode + '</textarea>' +
    '<button class="btn btn-p btn-full mt10" onclick="(function(){var t=document.getElementById(\'gasCodeBox\');t.select();navigator.clipboard.writeText(t.value).then(function(){alert(\'✅ Copied! Now paste into Apps Script and Save.\');}).catch(function(){document.execCommand(\'copy\');alert(\'Copied!\');});})()">📋 Copy Code</button>'
  );
}

// ════════════════════════════════════════════
// INIT — auto-pull on fresh device
// ════════════════════════════════════════════
function init() {
  loadState();
  selMonth = nowMonth();
  eid('monthLbl').textContent = mLabel(selMonth);
  updateDots();

  // Auto-pull ONLY if:
  // 1. This device has zero data (fresh install / new device)
  // 2. A gsUrl is saved
  // 3. We have NOT already attempted a pull this session (prevents infinite loop)
  var alreadyTried = localStorage.getItem(STORE_KEY + '_pullDone');
  var isEmpty = state.customers.length === 0 && state.suppliers.length === 0;
  if (isEmpty && state.settings.gsUrl && !alreadyTried) {
    setTimeout(function() { pullFromCloud(true); }, 1200);
  }
}

init();
